{% extends 'oil_logic/base.html' %}

{% block content %}
<section class="max-w-md mx-auto mt-20 px-6">
    <div class="glass p-10 rounded-3xl shadow-2xl space-y-8 animate-slide-up">
        <div class="text-center">
            <h2 class="text-3xl font-bold">Welcome <span class="text-red-500">Back</span></h2>
            <p class="text-gray-500 mt-2">Access your vehicle maintenance vault</p>
        </div>

        <form method="POST" class="space-y-6">
            {% csrf_token %}
            <div>
                <label class="block text-xs font-bold text-gray-500 mb-2 uppercase">Username</label>
                <input type="text" name="username"
                    class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-red-500">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 mb-2 uppercase">Password</label>
                <input type="password" name="password"
                    class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-red-500">
            </div>
            <button type="submit"
                class="btn-primary w-full py-4 rounded-xl font-bold text-white uppercase tracking-widest">
                Login to Vault
            </button>
        </form>

        <div class="relative flex py-5 items-center">
            <div class="flex-grow border-t border-white/10"></div>
            <span class="flex-shrink mx-4 text-gray-500 text-xs uppercase font-bold">Or continue with</span>
            <div class="flex-grow border-t border-white/10"></div>
        </div>

        {% load socialaccount %}
        <a href="{% provider_login_url 'google' %}"
            class="glass w-full py-4 rounded-xl font-bold text-white flex items-center justify-center space-x-3 hover:bg-white/5 transition">
            <i class="fab fa-google text-red-500"></i>
            <span>Continue with Google</span>
        </a>

        <p class="text-center text-sm text-gray-500">
            Don't have an account? <a href="{% url 'register' %}" class="text-red-400 hover:underline">Register
                engine</a>
        </p>
    </div>
</section>
{% endblock %}
