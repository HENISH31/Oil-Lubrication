{% extends 'oil_logic/base.html' %}

{% block content %}
<section class="max-w-4xl mx-auto px-6 py-12 min-h-[80vh] flex flex-col items-center justify-center">
    <!-- Stepper Progress -->
    <div id="stepper" class="w-full max-w-2xl mb-12 flex justify-between items-center relative">
        <div class="absolute top-1/2 left-0 w-full h-0.5 bg-white/5 -translate-y-1/2 z-0"></div>
        <div id="step-progress"
            class="absolute top-1/2 left-0 w-0 h-0.5 bg-red-500 -translate-y-1/2 z-0 transition-all duration-500"></div>

        <div class="step-item relative z-10 flex flex-col items-center gap-2 group active">
            <div
                class="w-10 h-10 rounded-full bg-[#0A0A0A] border-2 border-white/10 flex items-center justify-center group-[.active]:border-red-500 group-[.active]:text-red-500 transition-all font-bold">
                1</div>
            <span
                class="text-[10px] font-black uppercase tracking-widest text-gray-500 group-[.active]:text-white">Type</span>
        </div>
        <div class="step-item relative z-10 flex flex-col items-center gap-2 group">
            <div
                class="w-10 h-10 rounded-full bg-[#0A0A0A] border-2 border-white/10 flex items-center justify-center group-[.active]:border-red-500 group-[.active]:text-red-500 transition-all font-bold">
                2</div>
            <span
                class="text-[10px] font-black uppercase tracking-widest text-gray-500 group-[.active]:text-white">Vehicle</span>
        </div>
        <div class="step-item relative z-10 flex flex-col items-center gap-2 group">
            <div
                class="w-10 h-10 rounded-full bg-[#0A0A0A] border-2 border-white/10 flex items-center justify-center group-[.active]:border-red-500 group-[.active]:text-red-500 transition-all font-bold">
                3</div>
            <span
                class="text-[10px] font-black uppercase tracking-widest text-gray-500 group-[.active]:text-white">Result</span>
        </div>
    </div>

    <!-- Wizard Container -->
    <div class="w-full">
        <!-- Step 1: Vehicle Type -->
        <div id="wizard-step-1" class="wizard-step space-y-8 animate-in fade-in slide-in-from-bottom-5">
            <div class="text-center">
                <h2 class="text-4xl font-black uppercase tracking-tighter mb-4">Select <span class="text-red-500">Engine
                        Category</span></h2>
                <p class="text-gray-500">The journey to peak performance starts with your vehicle type.</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <button onclick="nextStep(2, 'Car')"
                    class="glass p-10 rounded-[2.5rem] flex flex-col items-center gap-6 group hover:border-red-500/50 transition-all duration-500">
                    <div
                        class="w-20 h-20 bg-white/5 rounded-3xl flex items-center justify-center group-hover:bg-red-500 transition-colors">
                        <i class="fas fa-car text-4xl text-white"></i>
                    </div>
                    <div class="text-center">
                        <h3 class="text-2xl font-black uppercase">Passenger Car</h3>
                        <p class="text-sm text-gray-500 mt-2 tracking-wide">Consumer & Performance Autos</p>
                    </div>
                </button>
                <button onclick="nextStep(2, 'Bike')"
                    class="glass p-10 rounded-[2.5rem] flex flex-col items-center gap-6 group hover:border-red-500/50 transition-all duration-500">
                    <div
                        class="w-20 h-20 bg-white/5 rounded-3xl flex items-center justify-center group-hover:bg-red-500 transition-colors">
                        <i class="fas fa-motorcycle text-4xl text-white"></i>
                    </div>
                    <div class="text-center">
                        <h3 class="text-2xl font-black uppercase">Motorcycle</h3>
                        <p class="text-sm text-gray-500 mt-2 tracking-wide">Two-Wheel Precision Engineering</p>
                    </div>
                </button>
            </div>
        </div>

        <!-- Step 2: Brand/Model/Year -->
        <div id="wizard-step-2" class="wizard-step hidden space-y-12 animate-in fade-in slide-in-from-right-10">
            <div class="text-center">
                <h2 class="text-4xl font-black uppercase tracking-tighter mb-4">Precision <span
                        class="text-red-500">Identification</span></h2>
                <p id="selected-type-display" class="text-xs font-black uppercase tracking-[0.3em] text-red-500"></p>
            </div>

            <div class="glass p-12 rounded-[2.5rem] space-y-10">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    <div class="space-y-3">
                        <label class="text-[10px] font-black uppercase tracking-widest text-gray-500">Brand</label>
                        <div class="relative">
                            <select id="brand-select"
                                class="w-full bg-black/5 border border-white/5 rounded-2xl px-6 py-5 text-lg font-bold outline-none focus:border-red-500 transition-all appearance-none cursor-pointer">
                                <option value="">Select Brand</option>
                            </select>
                            <i
                                class="fas fa-chevron-down absolute right-6 top-1/2 -translate-y-1/2 text-gray-500 pointer-events-none"></i>
                        </div>
                    </div>
                    <div class="space-y-3">
                        <label class="text-[10px] font-black uppercase tracking-widest text-gray-500">Model</label>
                        <div class="relative">
                            <select id="model-select"
                                class="w-full bg-white/5 border border-white/5 rounded-2xl px-6 py-5 text-lg font-bold outline-none focus:border-red-500 transition-all appearance-none cursor-pointer">
                                <option value="">Select Model</option>
                            </select>
                            <i
                                class="fas fa-chevron-down absolute right-6 top-1/2 -translate-y-1/2 text-gray-500 pointer-events-none"></i>
                        </div>
                    </div>
                    <div class="space-y-3">
                        <label class="text-[10px] font-black uppercase tracking-widest text-gray-500">Year</label>
                        <input type="number" id="year-input" placeholder="2024"
                            class="w-full bg-white/5 border border-white/5 rounded-2xl px-6 py-5 text-lg font-bold outline-none focus:border-red-500 transition-all">
                    </div>
                </div>

                <div class="flex flex-col md:flex-row gap-4 pt-6">
                    <button onclick="nextStep(1)"
                        class="w-full md:w-auto px-12 py-5 rounded-2xl font-black uppercase tracking-widest glass hover:bg-white/5 transition-all">Back</button>
                    <button id="find-btn"
                        class="flex-1 btn-primary py-5 rounded-2xl font-black uppercase tracking-widest text-white">Analyze
                        Specifications</button>
                </div>
            </div>
        </div>

        <!-- Step 3: Result & Loading -->
        <div id="wizard-step-3" class="wizard-step hidden animate-in fade-in">
            <!-- Loading View -->
            <div id="loading-view" class="flex flex-col items-center justify-center py-20 space-y-12">
                <div class="car-container relative w-64 h-24 flex items-center justify-center">
                    <!-- Speed Lines -->
                    <div class="absolute inset-0 overflow-hidden pointer-events-none">
                        <div class="speed-line line-1"></div>
                        <div class="speed-line line-2"></div>
                        <div class="speed-line line-3"></div>
                    </div>

                    <!-- The Sports Car -->
                    <div class="sports-car text-6xl text-red-500 relative z-10">
                        <i class="fas fa-car-side"></i>
                        <!-- Exhaust Flame -->
                        <div class="exhaust-flame"></div>
                    </div>

                    <!-- Road/Ground -->
                    <div class="absolute bottom-0 w-full h-1 bg-white/10 rounded-full overflow-hidden">
                        <div class="road-move"></div>
                    </div>
                </div>
                <div class="text-center">
                    <p class="text-sm font-black uppercase tracking-[0.3em] text-gray-500">Correlating Engine Specs</p>
                    <p class="text-[10px] text-gray-600 mt-2 font-mono">Running logic matrix v2.4...</p>
                </div>
            </div>

            <!-- Result View (Injected via JS) -->
            <div id="result-container" class="hidden"></div>
        </div>
    </div>
</section>

<style>
    .wizard-step.hidden {
        display: none;
    }

    .typewriter {
        overflow: hidden;
        border-right: .15em solid #FF4D4D;
        white-space: nowrap;
        margin: 0 auto;
        letter-spacing: .15em;
        animation:
            typing 3.5s steps(40, end),
            blink-caret .75s step-end infinite;
    }

    @keyframes typing {
        from {
            width: 0
        }

        to {
            width: 100%
        }
    }

    @keyframes blink-caret {

        from,
        to {
            border-color: transparent
        }

        50% {
            border-color: #FF4D4D;
        }
    }

    @keyframes carDrive {

        0%,
        100% {
            transform: translateY(0) rotate(0);
        }

        25% {
            transform: translateY(-2px) rotate(-1deg);
        }

        75% {
            transform: translateY(1px) rotate(1deg);
        }
    }

    @keyframes exhaust {

        0%,
        100% {
            transform: scale(1);
            opacity: 0.8;
        }

        50% {
            transform: scale(1.5);
            opacity: 0.4;
        }
    }

    @keyframes speedLine {
        from {
            transform: translateX(100%);
            opacity: 0;
        }

        50% {
            opacity: 1;
        }

        to {
            transform: translateX(-200%);
            opacity: 0;
        }
    }

    @keyframes roadMove {
        from {
            transform: translateX(100%);
        }

        to {
            transform: translateX(-100%);
        }
    }

    .sports-car {
        animation: carDrive 0.15s infinite linear;
    }

    .exhaust-flame {
        position: absolute;
        left: -15px;
        bottom: 5px;
        width: 20px;
        height: 10px;
        background: linear-gradient(to right, transparent, #FF4D4D);
        border-radius: 50%;
        filter: blur(2px);
        animation: exhaust 0.1s infinite alternate;
    }

    .speed-line {
        position: absolute;
        height: 2px;
        background: linear-gradient(to left, rgba(255, 77, 77, 0.5), transparent);
        border-radius: 2px;
    }

    .line-1 {
        top: 20%;
        width: 60px;
        animation: speedLine 0.4s infinite linear;
    }

    .line-2 {
        top: 50%;
        width: 100px;
        animation: speedLine 0.6s infinite linear 0.1s;
    }

    .line-3 {
        top: 80%;
        width: 40px;
        animation: speedLine 0.5s infinite linear 0.2s;
    }

    .road-move {
        width: 100%;
        height: 100%;
        background: repeating-linear-gradient(90deg, #FF4D4D 0, #FF4D4D 40px, transparent 40px, transparent 80px);
        animation: roadMove 0.3s infinite linear;
    }
</style>

<script>
    let currentType = 'Car';
    let currentStep = 1;
    window.currentResults = [];
    window.selectedProfile = {
        climate: 'Normal',
        style: 'Highway'
    };
    window.activeVehicleIndex = null;

    function nextStep(step, type = null) {
        console.log("Navigating to step:", step, type);
        if (type) {
            currentType = type;
            document.getElementById('selected-type-display').innerText = type + ' Engineering';
            loadBrands(type);
        }

        // Hide all steps
        document.querySelectorAll('.wizard-step').forEach(el => el.classList.add('hidden'));
        // Show target step
        document.getElementById(`wizard-step-${step}`).classList.remove('hidden');

        // Update Stepper UI
        const items = document.querySelectorAll('.step-item');
        items.forEach((item, idx) => {
            if (idx < step) item.classList.add('active');
            else item.classList.remove('active');
        });

        // Update Progress Bar
        const progress = document.getElementById('step-progress');
        progress.style.width = ((step - 1) / 2) * 100 + '%';

        currentStep = step;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function loadBrands(type) {
        const brandSelect = document.getElementById('brand-select');
        brandSelect.innerHTML = '<option value="">Select Brand</option>';
        try {
            const response = await fetch(`/api/brands/?vehicle_type=${type}`);
            const brands = await response.json();
            brands.reduce((acc, brand) => {
                const opt = document.createElement('option');
                opt.value = brand;
                opt.textContent = brand;
                brandSelect.appendChild(opt);
                return acc;
            }, '');
        } catch (e) { console.error(e); }
    }

    document.getElementById('brand-select').addEventListener('change', async (e) => {
        const brand = e.target.value;
        const modelSelect = document.getElementById('model-select');
        modelSelect.innerHTML = '<option value="">Select Model</option>';
        if (!brand) return;

        try {
            const response = await fetch(`/api/models/?brand=${brand}`);
            const models = await response.json();
            models.forEach(model => {
                const opt = document.createElement('option');
                opt.value = model;
                opt.textContent = model;
                modelSelect.appendChild(opt);
            });
        } catch (e) { console.error(e); }
    });

    document.getElementById('find-btn').addEventListener('click', async () => {
        const brandRaw = document.getElementById('brand-select').value;
        const modelRaw = document.getElementById('model-select').value;
        const yearRaw = document.getElementById('year-input').value;

        const brand = brandRaw ? brandRaw.trim() : '';
        const model = modelRaw ? modelRaw.trim() : '';
        const year = yearRaw ? yearRaw.trim() : '';

        if (!brand || !model || !year) return alert("Please specify brand, model and year");

        console.log("Searching for:", brand, model, year);
        nextStep(3);
        const loadingView = document.getElementById('loading-view');
        const container = document.getElementById('result-container');

        loadingView.classList.remove('hidden');
        container.classList.add('hidden');

        try {
            // Artificial delay for "Engine DNA Analysis" feel
            await new Promise(r => setTimeout(r, 1500));

            const params = new URLSearchParams({ brand, model, year });
            const response = await fetch(`${window.location.origin}/api/vehicles/recommendations/?${params.toString()}`);

            if (response.status === 404) {
                throw new Error("Vehicle not found in our database for this year. Please check the model year.");
            }
            if (!response.ok) throw new Error("Search service unavailable. Please try again later.");

            const data = await response.json();
            window.currentResults = Array.isArray(data) ? data : [data];

            if (window.currentResults.length === 0) {
                throw new Error("No variants found for this specific combination.");
            }

            // If multiple variants exist, show variant selection view
            if (window.currentResults.length > 1) {
                showVariantSelection(window.currentResults);
            } else if (window.currentResults.length === 1) {
                analyzeVehicle(0);
            }

        } catch (e) {
            console.error("Search Error:", e);
            alert(e.message || "Recommendation not found for this specific combination.");
            nextStep(2);
        }
    });

    function showVariantSelection(variants) {
        const loadingView = document.getElementById('loading-view');
        const container = document.getElementById('result-container');
        loadingView.classList.add('hidden');
        container.classList.remove('hidden');

        container.innerHTML = `
            <div class="space-y-8 animate-in slide-in-from-bottom-5 duration-700 max-w-2xl mx-auto">
                <div class="flex items-center justify-between border-b border-white/10 pb-4">
                    <p class="text-sm font-bold text-gray-500">${variants.length} vehicle(s) found.</p>
                </div>

                <div class="space-y-4">
                    ${variants.map((v, index) => `
                        <div onclick="triggerAI(${index})" 
                            class="group relative bg-white/5 border border-white/5 hover:border-red-500/50 p-6 rounded-2xl cursor-pointer transition-all hover:bg-white/[0.07] overflow-hidden">
                            <div class="flex justify-between items-start">
                                <div>
                                    <h4 class="text-xl font-black uppercase tracking-tighter text-white">
                                        ${v.brand} ${v.model} (${v.displacement_cc || '---'}cc) (${v.engine_type[0]}) (${v.year})
                                    </h4>
                                    <p class="text-sm text-gray-500 mt-1 font-bold">
                                        ${v.variant_name} / ${v.engine_type} Core
                                    </p>
                                </div>
                                <div class="text-[10px] font-black text-white/20 uppercase tracking-widest group-hover:text-red-500 transition-colors">
                                    Engine ID: ${v.id}
                                </div>
                            </div>
                            <!-- Subtle indicator -->
                            <div class="absolute inset-y-0 left-0 w-1 bg-transparent group-hover:bg-red-500 transition-all"></div>
                        </div>
                    `).join('')}
                </div>
                
            </div>
        `;
    }

    function selectProfile(category, value) {
        window.selectedProfile[category] = value;
        // Visual feedback
        const buttons = event.currentTarget.parentElement.querySelectorAll('.profile-btn');
        buttons.forEach(btn => {
            btn.classList.remove('border-red-500', 'bg-red-500/10');
            btn.classList.add('border-white/5', 'bg-white/5');
            btn.querySelector('i').classList.add('opacity-20');
        });
        event.currentTarget.classList.add('border-red-500', 'bg-red-500/10');
        event.currentTarget.classList.remove('border-white/5', 'bg-white/5');
        event.currentTarget.querySelector('i').classList.remove('opacity-20');
        event.currentTarget.querySelector('i').classList.add('opacity-100');
    }

    function triggerAI(index) {
        analyzeVehicle(index);
    }

    async function analyzeVehicle(index) {
        console.log("Analyzing vehicle index:", index);
        nextStep(3); // Show loading container
        const v = window.currentResults[index];
        if (!v) {
            console.error("Vehicle data not found at index", index);
            return;
        }

        const container = document.getElementById('result-container');
        const loadingView = document.getElementById('loading-view');

        // Ensure result is hidden while loading
        container.classList.add('hidden');
        loadingView.classList.remove('hidden');

        // Minimal feedback delay for "calculation feel"
        await new Promise(r => setTimeout(r, 1200));

        console.log("Displaying result for:", v.brand, v.model);
        showRecommendationResult(v);
    }

    function calculateAIOil(v, profile) {
        console.log("Calculating AI Oil for:", v.vehicle_type, v.engine_type);
        // Base Viscosity Hierarchy
        const levels = ['0W-20', '5W-30', '5W-40', '10W-40', '15W-50', '20W-50'];
        let baseIndex = 1; // Default 5W-30

        try {
            // Normalize engine type (handle string or array)
            const engineType = Array.isArray(v.engine_type) ? v.engine_type[0] : v.engine_type;
            const variantName = v.variant_name ? v.variant_name.toLowerCase() : '';

            // 1. Base Logic
            if (engineType === 'Diesel') baseIndex = 2; // 5W-40
            else if (engineType === 'Petrol' || variantName.includes('hybrid')) baseIndex = 0; // 0W-20

            // Turbo Override
            if (variantName.includes('turbo') && baseIndex < 1) baseIndex = 1; // Min 5W-30

            // 2. Climate Adjustment
            if (profile.climate === 'Hot') baseIndex = Math.min(baseIndex + 1, levels.length - 1);
            else if (profile.climate === 'Cold') baseIndex = Math.max(baseIndex - 1, 0);

            // 3. Vehicle Age (<= 2021)
            if (v.year <= 2021) baseIndex = Math.min(baseIndex + 1, levels.length - 1);

            // 4. Driving Style Overrides
            if (profile.style === 'Heavy') baseIndex = 2; // Force 5W-40
        } catch (e) {
            console.warn("Calculation nudge error, using defaults:", e);
        }

        return {
            viscosity: levels[baseIndex] || '5W-30',
            is_heavy: profile.style === 'Heavy',
            is_aged: v.year <= 2021
        };
    }

    function showRecommendationResult(v) {
        console.log("Rendering Result View Core...");
        try {
            const aiResult = calculateAIOil(v, window.selectedProfile);
            const loadingView = document.getElementById('loading-view');
            const container = document.getElementById('result-container');

            loadingView.classList.add('hidden');
            container.classList.remove('hidden');

            // Normalize fields for display
            const vType = (Array.isArray(v.vehicle_type) ? v.vehicle_type[0] : v.vehicle_type || 'Vehicle').toLowerCase();
            const eType = Array.isArray(v.engine_type) ? v.engine_type[0] : v.engine_type || 'Engine';
            const cc = v.displacement_cc || '---';
            const vName = v.variant_name || 'Standard';

            // Safe fallback for oil details
            const oil = v.recommended_oil_details || {
                brand: 'Castrol',
                viscosity: aiResult.viscosity,
                api_rating: 'SN/SP Plus',
                change_interval_km: 10000,
                price: '---'
            };

            // Mock image mapping for professional look
            const oilImages = {
                'Castrol': 'https://www.castrol.com/content/dam/castrol/master/products/engine-oil/car-engine-oil/castrol-gtx/castrol-gtx-15w-40-diesel/castrol-gtx-diesel-15w-40-1l.png',
                'Castrol EDGE': 'https://www.castrol.com/content/dam/castrol/master/products/engine-oil/car-engine-oil/castrol-edge/castrol-edge-5w-30-ll-1l.png',
                'Castrol GTX': 'https://www.castrol.com/content/dam/castrol/master/products/engine-oil/car-engine-oil/castrol-gtx/castrol-gtx-15w-40-diesel/castrol-gtx-diesel-15w-40-1l.png',
                'Motul': 'https://static.motul.com/production/posts/14/original/7100_4T_10W40.png',
                'Motul 7100': 'https://static.motul.com/production/posts/14/original/7100_4T_10W40.png',
                'Motul 5100': 'https://static.motul.com/production/posts/14/original/5100_4T_15W50.png',
                'Motul 8100': 'https://static.motul.com/production/posts/14/original/8100_X_CESS_5W40.png',
                'Shell': 'https://shell.com.gr/media/2552/helix-ultra-5w-40-1l.png',
                'Shell Helix': 'https://shell.com.gr/media/2552/helix-ultra-5w-40-1l.png',
                'Mobil 1': 'https://www.mobil.com/content/dam/mobil/products/commercial/passenger-car-motor-oil/mobil-1/mobil-1-5w-30-1l.png',
                'Mobil Super': 'https://www.mobil.com/content/dam/mobil/products/commercial/passenger-car-motor-oil/mobil-super/mobil-super-2000-x1-10w-40-1l.png',
                'Liqui Moly': 'https://s3.eu-central-1.amazonaws.com/liquimoly-products-media/media/catalog/product/cache/1/image/600x/9df78eab33525d08d6e5fb8d27136e95/2/3/2324_top_tec_4200_5w_30_new_generation_4l_a1a5.png'
            };

            const oilImg = oil.image_url || oilImages[oil.brand] || oilImages[oil.brand.split(' ')[0]] || oilImages['Castrol'];
            const shopBrand = oil.brand.split(' ')[0]; // Use base brand for shop filter (e.g. 'Castrol')

            container.innerHTML = `
            <div class="w-full max-w-5xl mx-auto space-y-6 animate-in fade-in duration-700">
                <!-- Top Navigation Bar -->
                <div class="flex items-center justify-between mb-8">
                    <button onclick="nextStep(2)" class="flex items-center gap-2 text-sm font-bold text-gray-400 hover:text-white transition-all">
                        <i class="fas fa-arrow-left"></i> Back
                    </button>
                    <div class="bg-green-600/20 text-green-500 text-[10px] font-black uppercase tracking-widest px-4 py-2 rounded-lg border border-green-500/20 flex items-center gap-2">
                        <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div> Engine
                    </div>
                </div>

                <h3 class="text-2xl font-black uppercase tracking-tighter mb-4">${oil.brand} Recommendation</h3>
                <!-- Main Professional Layout - Compact -->
                <div class="bg-white rounded-2xl overflow-hidden shadow-2xl flex flex-col md:flex-row min-h-[400px]">
                    <!-- Left Column: Product Image -->
                    <div class="md:w-5/12 bg-gray-50 flex items-center justify-center p-8 border-r border-gray-100 relative overflow-hidden">
                        <div class="absolute inset-0 opacity-[0.03] pointer-events-none" style="background-image: radial-gradient(#000 1px, transparent 1px); background-size: 20px 20px;"></div>
                        <img src="${oilImg}" alt="${oil.brand}" class="h-[250px] object-contain drop-shadow-[0_20px_20px_rgba(0,0,0,0.15)] hover:scale-105 transition-transform duration-700">
                    </div>

                    <!-- Right Column: Details -->
                    <div class="md:w-7/12 p-8 md:p-10 space-y-6 flex flex-col justify-between text-gray-900">
                        <div>
                            <p class="text-[9px] font-black uppercase tracking-[0.2em] text-red-500 mb-1">Personalized Recommendation</p>
                            <h4 class="text-xl font-black leading-tight mb-2">
