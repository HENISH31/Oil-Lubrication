{% extends "oil_logic/base.html" %}
{% load i18n %}

{% block head_title %}{% trans "Signup Closed" %}{% endblock %}

{% block content %}
<section class="max-w-md mx-auto mt-20 px-6 text-center">
    <div class="glass p-10 rounded-3xl shadow-2xl space-y-8">
        <div class="space-y-4">
            <i class="fas fa-lock text-6xl text-red-500"></i>
            <h1 class="text-3xl font-bold">{% trans "Signup Closed" %}</h1>
        </div>

        <p class="text-gray-400">
            {% trans "Social account registration is currently closed." %}
        </p>

        <div class="pt-4 text-sm text-gray-500">
            <a href="{% url 'home' %}" class="hover:text-red-400 transition">
                <i class="fas fa-home mr-2"></i> Return Home
            </a>
        </div>
    </div>
</section>
{% endblock %}
